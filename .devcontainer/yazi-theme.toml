[manager]
cwd = { fg = "#89B4FA" }

hovered         = { fg = "#1E1E2E", bg = "#89B4FA" }
preview_hovered = { underline = true }

find_keyword  = { fg = "#F9E2AF", italic = true }
find_position = { fg = "#FAB387", bg = "reset", italic = true }

marker_copied   = { fg = "#A6E3A1", bg = "#A6E3A1" }
marker_cut      = { fg = "#F38BA8", bg = "#F38BA8" }
marker_selected = { fg = "#89B4FA", bg = "#89B4FA" }
marker_marked   = { fg = "#89DCEB", bg = "#89DCEB" }

tab_active   = { fg = "#1E1E2E", bg = "#89B4FA" }
tab_inactive = { fg = "#CDD6F4", bg = "#313244" }
tab_width    = 1

count_copied   = { fg = "#1E1E2E", bg = "#A6E3A1" }
count_cut      = { fg = "#1E1E2E", bg = "#F38BA8" }
count_selected = { fg = "#1E1E2E", bg = "#89B4FA" }

border_symbol = "│"
border_style  = { fg = "#45475A" }

[status]
separator_open  = ""
separator_close = ""
separator_style = { fg = "#313244", bg = "#313244" }

mode_normal = { fg = "#1E1E2E", bg = "#89B4FA", bold = true }
mode_select = { fg = "#1E1E2E", bg = "#A6E3A1", bold = true }
mode_unset  = { fg = "#1E1E2E", bg = "#FAB387", bold = true }

progress_label  = { bold = true }
progress_normal = { fg = "#89B4FA", bg = "#313244" }
progress_error  = { fg = "#F38BA8", bg = "#313244" }

perm_type  = { fg = "#89B4FA" }
perm_read  = { fg = "#A6E3A1" }
perm_write = { fg = "#F38BA8" }
perm_exec  = { fg = "#FAB387" }
perm_sep   = { fg = "#45475A" }

[input]
cursor = { fg = "#1E1E2E", bg = "#CDD6F4" }
title  = { fg = "#CDD6F4", bold = true }
value  = { fg = "#CDD6F4" }
select = { fg = "#1E1E2E", bg = "#89B4FA" }

[completion]
border   = { fg = "#89B4FA" }
active   = { bg = "#313244" }
inactive = { bg = "#1E1E2E" }

[tasks]
border  = { fg = "#89B4FA" }
title   = {}
hovered = { underline = true }

[which]
mask            = { bg = "#1E1E2E" }
cand            = { fg = "#89DCEB" }
rest            = { fg = "#6C7086" }
desc            = { fg = "#CDD6F4" }
separator       = "  "
separator_style = { fg = "#45475A" }

[help]
on      = { fg = "#89DCEB" }
run     = { fg = "#CDD6F4" }
desc    = { fg = "#6C7086" }
hovered = { bg = "#313244", bold = true }
footer  = { fg = "#1E1E2E", bg = "#89B4FA" }

[filetype]
rules = [
  { mime = "image/*",                      fg = "#A6E3A1" },
  { mime = "video/*",                      fg = "#CBA6F7" },
  { mime = "audio/*",                      fg = "#F38BA8" },
  { mime = "application/zip",              fg = "#F9E2AF" },
  { mime = "application/gzip",             fg = "#F9E2AF" },
  { mime = "application/x-tar",            fg = "#F9E2AF" },
  { mime = "application/x-bzip2",          fg = "#F9E2AF" },
  { mime = "application/x-7z-compressed",  fg = "#F9E2AF" },
  { mime = "application/x-rar",            fg = "#F9E2AF" },
  { name = "*/", fg = "#89B4FA" },
  { name = "*",  fg = "#CDD6F4" },
]
